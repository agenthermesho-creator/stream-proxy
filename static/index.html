<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>⚽ New Zealand vs Iran — World Cup 2026</title>
<link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
  .wrap { width: 100%; max-width: 1280px; }
  .video-js { width: 100%; height: auto; aspect-ratio: 16/9; }
  .badge {
    position: fixed; top: 12px; left: 12px; z-index: 99;
    background: #e00; color: #fff; font: bold 11px system-ui;
    padding: 4px 10px; border-radius: 3px; letter-spacing: 0.5px;
  }
  .status {
    position: fixed; top: 12px; right: 12px; z-index: 99;
    background: #333; color: #aaa; font: 10px monospace;
    padding: 4px 8px; border-radius: 3px;
  }
</style>
</head>
<body>
<div class="badge">● LIVE</div>
<div class="status" id="status">initializing…</div>
<div class="wrap">
  <video id="video" class="video-js vjs-default-skin vjs-big-play-centered"
         controls autoplay muted playsinline></video>
</div>
<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
<script>
// Current embed ID (changes per match - update when stream rotates)
var EMBED_ID = '52090';
var PLAYLIST = '/proxy?url=' + encodeURIComponent('https://chatgpt.hereisman.net/playlist/' + EMBED_ID + '/load-playlist');

function setStatus(msg) {
  var el = document.getElementById('status');
  if (el) el.textContent = new Date().toLocaleTimeString() + ' ' + msg;
}

var player = videojs('video', {
  liveui: true,
  html5: {
    hls: {
      overrideNative: true,
      enableLowLatency: true,
      smoothQualityChange: true,
      handlePartialData: true,
      // Aggressive retry for signed URL expiry (5-min TTL)
      fragLoadingMaxRetry: 30,
      fragLoadingRetryDelay: 500,
      fragLoadingMaxRetryTimeout: 60000,
      manifestLoadingMaxRetry: 20,
      manifestLoadingRetryDelay: 500,
      levelLoadingMaxRetry: 20,
      levelLoadingRetryDelay: 500,
      // Live edge handling - CRITICAL for live streams
      liveSyncDurationCount: 3,       // sync to 3 segments from live edge
      liveMaxLatencyDuration: 15,     // if >15s behind, catch up
      liveDurationInfinity: true,
      // Buffer - small buffer for low latency
      maxBufferLength: 15,
      maxBufferSize: 30 * 1000 * 1000,
      maxMaxBufferLength: 30,
      // Recovery
      hlsRecoverAttempts: 20,
      hlsRecoverMaxRetry: 10,
      appendErrorMaxRetry: 10,
      // Start from live edge
      startLevel: -1,
      // Test bandwidth
      startFragPrefetch: true
    }
  },
  sources: [{ src: PLAYLIST, type: 'application/x-mpegURL' }]
});

// Error recovery
var retryCount = 0;
var maxRetries = 10;
var lastRecover = 0;

function recover(reason) {
  var now = Date.now();
  if (now - lastRecover < 3000) return; // debounce
  if (retryCount >= maxRetries) {
    setStatus('max retries — refresh page');
    return;
  }
  retryCount++;
  lastRecover = now;
  setStatus('recovering: ' + reason + ' (' + retryCount + '/' + maxRetries + ')');
  player.src({ src: PLAYLIST + '&t=' + Date.now(), type: 'application/x-mpegURL' });
  player.play().catch(function() {});
}

player.on('error', function() {
  var err = player.error();
  setStatus('error: ' + (err && err.code ? err.code : 'unknown'));
  setTimeout(function() { recover('error'); }, 1000);
});

player.on('stalled', function() {
  setStatus('stalled');
  setTimeout(function() {
    if (player.paused()) recover('stalled');
  }, 3000);
});

player.on('ended', function() {
  setStatus('ended — restarting');
  setTimeout(function() { recover('ended'); }, 500);
});

player.on('waiting', function() {
  setStatus('buffering…');
});

player.on('playing', function() {
  if (retryCount > 0) {
    setStatus('playing (recovered)');
    retryCount = 0;
  } else {
    setStatus('playing');
  }
});

// Force manifest refresh every 3 seconds for live (signed URLs rotate fast)
var refreshInterval = setInterval(function() {
  if (player.hls && player.hls.playlistLoader) {
    player.hls.playlistLoader.tick();
  }
}, 3000);

// Also refresh on quality change / level switch
player.on('loadedmetadata', function() {
  setStatus('metadata loaded');
});

// Cleanup on unload
window.addEventListener('beforeunload', function() {
  clearInterval(refreshInterval);
});

setStatus('loading…');
</script>
</body>
</html>
