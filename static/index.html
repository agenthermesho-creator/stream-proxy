<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FWC TV — World Cup 2026</title>
<link href="https://vjs.zencdn.net/8.16.1/video-js.css" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #000; display: flex; align-items: center; justify-content: center; min-height: 100dvh; }
  .wrap { width: 100%; max-width: 1280px; }
  .video-js { width: 100%; height: auto; aspect-ratio: 16/9; }
  .badge {
    position: fixed; top: 12px; left: 12px; z-index: 99;
    background: #e00; color: #fff; font: bold 11px system-ui;
    padding: 4px 10px; border-radius: 3px; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<div class="badge">● LIVE</div>
<div class="wrap">
  <video id="video" class="video-js vjs-default-skin vjs-big-play-centered"
         controls autoplay muted playsinline></video>
</div>
<script src="https://vjs.zencdn.net/8.16.1/video.min.js"></script>
<script>
videojs('video', {
  liveui: true,
  html5: { hls: { overrideNative: true, enableLowLatency: true } },
  sources: [{ src: 'proxy/api/stream?q=4k', type: 'application/x-mpegURL' }]
});
</script>
</body>
</html>
